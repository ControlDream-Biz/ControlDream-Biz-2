name: Electron Build and Release

# 触发条件
on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # 允许手动触发

# 设置权限
permissions:
  contents: write

# 环境变量
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # 构建 Windows 版本
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Build Electron (Windows x64)
        run: pnpm electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-x64
          path: dist-electron/*.exe
          retention-days: 30

      - name: Upload artifacts (Portable)
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-x64
          path: dist-electron/*-unpacked/
          retention-days: 30

      - name: Release (仅 tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true

  # 构建 macOS 版本
  build-macos:
    name: Build macOS (x64 + arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Build Electron (macOS)
        run: pnpm electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Upload artifacts (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg
          retention-days: 30

      - name: Upload artifacts (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: dist-electron/*.zip
          retention-days: 30

      - name: Release (仅 tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true

  # 构建 Linux 版本
  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libasound2-dev

      - name: Build Electron (Linux)
        run: pnpm electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-electron/*.AppImage
          retention-days: 30

      - name: Upload artifacts (DEB)
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist-electron/*.deb
          retention-days: 30

      - name: Upload artifacts (RPM)
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist-electron/*.rpm
          retention-days: 30

      - name: Release (仅 tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true

  # 汇总发布
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 创梦管理后台 v${{ github.ref_name }}

            ## 📥 下载安装包

            ### Windows
            - **NSIS 安装包**: 下载 `创梦管理后台 Setup x.x.x.exe`
            - **便携版**: 下载 `创梦管理后台 x.x.x.exe`

            ### macOS
            - **DMG 安装包**: 下载 `创梦管理后台-x.x.x.dmg`
            - **ZIP 压缩包**: 下载 `创梦管理后台-x.x.x-mac.zip`

            ### Linux
            - **AppImage**: 下载 `创梦管理后台-x.x.x.AppImage` (通用)
            - **DEB**: 下载 `创梦管理后台-x.x.x.deb` (Ubuntu/Debian)
            - **RPM**: 下载 `创梦管理后台-x.x.x.rpm` (Fedora/RHEL)

            ## ✨ 新功能
            - 50+ 功能模块
            - 系统监控（CPU/内存/磁盘）
            - 网络监控
            - 窗口控制
            - 截图功能
            - 剪贴板管理
            - 工具箱
            - 安全中心
            - 自动化任务

            ## 🔧 使用说明
            详细文档请查看 `ELECTRON_GUIDE.md`

            ## 🐛 问题反馈
            如有问题，请提交 Issue

            ---
            **发布日期**: ${{ github.event.head_commit.timestamp }}
