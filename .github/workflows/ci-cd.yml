name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 安装依赖
        run: pnpm install

      - name: TypeScript 类型检查
        run: pnpm ts-check

      - name: ESLint 检查
        run: pnpm lint
        continue-on-error: true

      - name: 运行测试
        run: pnpm test
        continue-on-error: true

  # 构建测试
  build:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm build
        env:
          NODE_ENV: production

      - name: 检查构建产物
        run: |
          ls -la .next/static/
          ls -la .next/server/

  # 安全扫描
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行依赖安全检查
        run: |
          pnpm audit --audit-level=high
        continue-on-error: true

      - name: 代码安全检查
        run: |
          # 检查敏感信息泄露
          grep -r "password\|secret\|api_key\|private_key" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules --exclude-dir=.next || true

  # 性能测试
  performance:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm build
        env:
          NODE_ENV: production

      - name: 分析包大小
        run: |
          du -sh .next/static/
          du -sh .next/server/

  # 部署（仅 main 分支）
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build, security-scan, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署
        run: |
          echo "部署到生产环境"
          # 这里添加实际的部署命令

      - name: 部署后验证
        run: |
          echo "验证部署"
          # 这里添加验证命令
